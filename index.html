<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Mensajes con Asesor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 30px;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin: 0 auto;
        }
        h2 { color: #075e54; margin-top: 0; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; }
        textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: white;
        }
        textarea { resize: vertical; }
        button {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover { background-color: #1ebd56; }
        .lista-envios { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .item-envio {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid #25d366;
            transition: all 0.3s ease;
        }
        .btn-enviar {
            background-color: #075e54;
            padding: 6px 12px;
            font-size: 13px;
            width: auto;
            margin-top: 0;
        }
        .btn-enviar:hover { background-color: #054c44; }
        .box-asesores {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #ccc;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Envío Masivo Express con Asesor de Contacto</h2>
    
    <div class="box-asesores">
        <label for="selectAsesor" style="margin-top: 0px;">1. Selecciona el Asesor / Gestor para este envío:</label>
        <select id="selectAsesor">
            <option value="">-- Seleccione un asesor de la lista --</option>
            <option value='{"nombre":"Holman","numero":"87964785"}'>Holman (📞 87964785)</option>
            <option value='{"nombre":"Jose Brizuela","numero":"82852577"}'>Jose Brizuela (📞 82852577)</option>
            <option value='{"nombre":"Alejandro Reyes","numero":"82728286"}'>Alejandro Reyes (📞 82728286)</option>
            <option value='{"nombre":"Geovanny Manzanarez","numero":"85602699"}'>Geovanny Manzanarez (📞 85602699)</option>
            <option value='{"nombre":"Miguel Mendoza","numero":"89898646"}'>Miguel Mendoza (📞 89898646)</option>
            <option value='{"nombre":"Flabio Cuevas","numero":"87961435"}'>Flabio Cuevas (📞 87961435)</option>
            <option value='{"nombre":"Clara Sacasa","numero":"82590967"}'>Clara Sacasa (📞 82590967)</option>
            <option value='{"nombre":"Milton Torres","numero":"83969759"}'>Milton Torres (📞 83969759)</option>
            <option value='{"nombre":"Jose Ortiz","numero":"87969683"}'>Jose Ortiz (📞 87969683)</option>
            <option value='{"nombre":"Marcos Ortiz","numero":"86745172"}'>Marcos Ortiz (📞 86745172)</option>
            <option value='{"nombre":"Rudy Leiva","numero":"77029910"}'>Rudy Leiva (📞 77029910)</option>
            <option value='{"nombre":"Steven Nuñez","numero":"88685060"}'>Steven Nuñez (📞 88685060)</option>
        </select>
    </div>

    <label for="txtMensaje">2. Escribí el mensaje base (sin los datos de contacto):</label>
    <textarea id="txtMensaje" rows="5" placeholder="Escribe aquí el cuerpo del mensaje masivo..."></textarea>

    <label for="txtNumeros">3. Pegá los números de los clientes (uno por línea):</label>
    <textarea id="txtNumeros" rows="5" placeholder="88888888&#10;55555555"></textarea>

    <button onclick="procesarLista()">Generar Lista de Envíos</button>

    <div class="lista-envios" id="listaEnvios" style="display: none;">
        <h3 style="color: #075e54; margin-top: 0;">📋 Enlaces de Envío Listos</h3>
        <div id="contenedorItems"></div>
    </div>
</div>

<script>
function procesarLista() {
    const mensajeBase = document.getElementById('txtMensaje').value;
    const numerosRaw = document.getElementById('txtNumeros').value;
    const selectorAsesor = document.getElementById('selectAsesor').value;
    const contenedor = document.getElementById('contenedorItems');
    const seccionLista = document.getElementById('listaEnvios');
    
    contenedor.innerHTML = '';
    
    if(!mensajeBase.trim() || !numerosRaw.trim()){
        alert("Por favor, llena el mensaje y agrega al menos un número de cliente.");
        return;
    }

    if(!selectorAsesor) {
        alert("Por favor, selecciona un asesor válido de la lista.");
        return;
    }

    // Extraemos los datos del asesor seleccionado
    const datosAsesor = JSON.parse(selectorAsesor);
    
    // Construimos el remate del mensaje con los datos del asesor
    const textoContacto = ` Gestor de Cliente ${datosAsesor.nombre} al número: ${datosAsesor.numero}.`;
    const mensajeCompleto = mensajeBase.trim() + ('\n') + '*' + textoContacto;

    const lineas = numerosRaw.split('\n');
    let cantidadValida = 0;

    lineas.forEach((linea) => {
        let numero = linea.replace(/\s+/g, '').replace(/[^0-9]/g, '');
        
        if(numero.length > 0) {
            if (numero.length === 8) {
                numero = '505' + numero;
            }
            
            cantidadValida++;
            
            const mensajeCodificado = encodeURIComponent(mensajeCompleto);
            const linkWhatsapp = `https://wa.me/${numero}?text=${mensajeCodificado}`;
            
            const item = document.createElement('div');
            item.className = 'item-envio';
            
            item.innerHTML = `
                <span>📞 Enviar a: +${numero}</span>
                <button class="btn-enviar" onclick="enviarYBorrar(this, '${linkWhatsapp}')">Enviar chat</button>
            `;
            contenedor.appendChild(item);
        }
    });

    if(cantidadValida > 0) {
        seccionLista.style.display = 'block';
    } else {
        alert("No se encontraron números de clientes válidos.");
    }
}

function enviarYBorrar(boton, url) {
    window.open(url, '_blank');
    const itemEnvio = boton.closest('.item-envio');
    if (itemEnvio) {
        itemEnvio.remove();
    }
    const contenedor = document.getElementById('contenedorItems');
    if (contenedor.children.length === 0) {
        document.getElementById('listaEnvios').style.display = 'none';
    }
}
</script>

</body>
</html>
